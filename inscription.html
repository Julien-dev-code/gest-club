<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/pages/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header>
        <div class="navbar">
            <span class="navbar__brand">GEST<span>CLUB</span></span>
            <button class="btn--ghost">Retour a l'accueil</button>
        </div>
    </header>
    <main>
        <div class="hero">
            <img class="hero__image" src="assets/images/gabriele-fenili-7MF6_YwHJA8-unsplash.jpg" alt="">
            <h1 class="hero__title">Votre club,<br>vos <span class="hero__title--accent">événements.</span></h1>
            <p class="hero__subtitle">Créez votre compte et réservez vos premières places en moins de 2 minutes.</p>
        </div>
        <div class="form__group">
            <div class="form__header">
                <h2>Inscription</h2>
                <h3>Créer mon compte</h3>
                <p>Déjà inscrit ? <a href="connexion.html">Se connecter</a></p>
            </div>
            <form action="" method="POST">
                <div class="form__row">

                    <div class="form-group">
                        <label class="form__label" for="firstname">Prénom</label>
                        <input class="form__input" type="text" id="firstname" name="firstname" required placeholder="Julien">
                    </div>
                    
                    <div class="form-group">
                        <label class="form__label" for="lastname">Nom</label>
                        <input class="form__input" type="text" id="lastname" name="lastname" required placeholder="Dupont">
                    </div>

                    
                </div>

                <div class="form-group">
                    <label class="form__label" for="phone">Téléphone</label>
                    <input class="form__input" type="tel" id="phone" name="phone" required placeholder="06 12 34 56 78">
                </div>

                <div class="form-group">
                    <label class="form__label" for="mail">Adresse email</label>
                    <input class="form__input" type="email" id="mail" name="mail" required placeholder="Exemple@email.com">
                </div>

                <div class="form-group">
                    <label class="form__label" for="pwd">Mot de passe</label>
                    <input class="form__input" type="password" id="pwd" name="pwd" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label class="form__label" for="password-confirm">Confirmer le mot de passe</label>
                    <input class="form__input" type="password" id="password-confirm" name="password-confirm" required placeholder="••••••••">
                </div>

                <div class="form__footer">
                    <label class="form__check">
                        <input type="checkbox" required>
                        J'accepte les conditions d'utilisation
                    </label>
                    <button class="btn--primary" type="submit">Créer mon compte</button>
                    <p>Déjà inscrit ? <a href="connexion.html">Se connecter</a></p>
                </div>

            </form>
        </div>
    </main>
</body>
</html>
